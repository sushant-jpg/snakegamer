<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🐍 Advanced Snake Game</h1>

    <div class="score-board">
        <span>Score: <b id="score">0</b></span>
        <span>High Score: <b id="highScore">0</b></span>
    </div>

    <p id="status">Press Restart to begin</p>

    <div class="game-shell">
        <canvas id="game" width="400" height="400"></canvas>
    </div>

    <div class="controls" aria-label="Touch controls">
        <button class="control-btn" data-direction="UP">⬆️</button>
        <div class="controls-row">
            <button class="control-btn" data-direction="LEFT">⬅️</button>
            <button class="control-btn" data-direction="DOWN">⬇️</button>
            <button class="control-btn" data-direction="RIGHT">➡️</button>
        </div>
    </div>

    <button class="restart-btn" onclick="restartGame()">Restart</button>
    <p class="hint">Use Arrow Keys or on-screen buttons on mobile</p>
    
    <div class="top-controls">
        <button id="fullscreenBtn" class="control-btn">⤢ Fullscreen</button>
    </div>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="overlay-panel">
            <h2 id="overlay-title">Game Over</h2>
            <p id="overlay-msg">Score: 0</p>
            <div class="overlay-actions">
                <button id="overlay-restart" class="control-btn">Play Again</button>
                <button id="overlay-close" class="control-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
